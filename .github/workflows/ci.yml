name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [ gcc, clang ]
        build_type: [ Debug, Release ]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Conan
        run: pip install 'conan>=2.0,<3'

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ matrix.compiler }}-${{ matrix.build_type }}-
            conan-${{ matrix.compiler }}-

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: >
          conan install .
          --output-folder=build
          --build=missing
          -s build_type=${{ matrix.build_type }}
          -c tools.cmake.cmaketoolchain:generator=Ninja

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Smoke test
        run: bash scripts/ci_smoke_test.sh build

  release:
    name: Release binaries
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Conan
        run: pip install 'conan>=2.0,<3'

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: >
          conan install .
          --output-folder=build
          --build=missing
          -s build_type=Release
          -c tools.cmake.cmaketoolchain:generator=Ninja

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p dist
          cp build/producer build/consumer dist/
          tar -czf "ipc_packets-${{ github.ref_name }}-linux-x86_64.tar.gz" -C dist producer consumer

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ipc_packets-${{ github.ref_name }}-linux-x86_64.tar.gz
          generate_release_notes: true
